<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mehis</title>
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8F66;
            --dark: #1a1a1a;
            --light: #fafafa;
            --gray: #666;
            --border: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #F5F5DC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: #F5F5DC;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-decoration: none;
        }
        
        .logo span {
            color: var(--dark);
        }
        
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        p.subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: #2C3E50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: var(--primary-light);
        }
        
        .terms {
            font-size: 13px;
            color: var(--gray);
            margin-top: 15px;
            text-align: center;
        }
        
        .terms a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: var(--gray);
        }
        
        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <a href="index.html" class="logo">Mehis<span>.ai</span></a>
        
        <h1>Create your account</h1>
        <p class="subtitle">Start getting better ADHD parenting advice today</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required minlength="8">
            </div>
            
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <p class="terms">
            By signing up, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
        </p>
        
        <p class="signup-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault()
            const name = document.getElementById('name').value
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            
            console.log('Register:', name, email)
            alert('Registration coming soon! We\'re building this now.')
        })
    </script>
</body>
</html>
