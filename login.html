<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mehis</title>
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8F66;
            --dark: #1a1a1a;
            --light: #fafafa;
            --gray: #666;
            --border: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-decoration: none;
        }
        
        .logo span {
            color: var(--dark);
        }
        
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        p.subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: var(--primary-light);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            color: var(--gray);
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: var(--border);
            vertical-align: middle;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: var(--gray);
        }
        
        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .forgot {
            text-align: right;
            margin-top: 8px;
        }
        
        .forgot a {
            color: var(--gray);
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="logo">Mehis<span>.ai</span></a>
        
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to continue to your dashboard</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="forgot">
                    <a href="#">Forgot password?</a>
                </div>
            </div>
            
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="divider">or</div>
        
        <button class="btn" style="background: var(--dark);" onclick="alert('Discord login coming soon!')">
            Continue with Discord
        </button>
        
        <p class="signup-link">
            Don't have an account? <a href="register.html">Sign up free</a>
        </p>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault()
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            
            // Placeholder - will connect to Supabase later
            console.log('Login:', email)
            alert('Login system coming soon! Register first.')
        })
    </script>
</body>
</html>
