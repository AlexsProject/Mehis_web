<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Mehis</title>
    <style>
        body { background: #F5F5DC; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; }
        h1 { color: #2C3E50; text-align: center; margin-bottom: 5px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: #F5F5DC; box-sizing: border-box;}
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin: 5px 0; display: block; text-decoration: none; text-align: center; box-sizing: border-box; }
        .btn-email { background: #2C3E50; color: #F5F5DC; }
        .btn-discord { background: #2C3E50; color: #F5F5DC; }
        .link { display: block; text-align: center; margin-top: 15px; color: #2C3E50; }
        .divider { text-align: center; color: #666; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Login to Mehis.ai</h1>
        <p class="subtitle">ADHD coaching assistant</p>
        
        <!-- Email Login FIRST -->
        <form id="form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn btn-email">Sign In</button>
        </form>
        
        <!-- Discord Login UNDER email -->
        <div class="divider">or</div>
        
        <a href="https://etgaxhkizapqzzxdttrn.supabase.co/auth/v1/authorize?provider=discord&redirect_to=https://alexsproject.github.io/Mehis_web/dashboard.html" class="btn btn-discord">
            💬 Login with Discord
        </a>
        
        <a href="register.html" class="link">Create account</a>
    </div>

    <script>
    const URL = 'https://etgaxhkizapqzzxdttrn.supabase.co'
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0Z2F4aGtpemFwcXp6eGR0dHJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzMzOTQsImV4cCI6MjA5MTI0OTM5NH0.XlgKhu0wAo1570kgexl5a9gnhD-x0e_eOs7O_ucK640'

    // If already logged in, go to dashboard
    if (localStorage.getItem('mehis_token')) {
        location.href = 'dashboard.html'
    }

    // Handle OAuth callback
    function handleOAuthCallback() {
        // Check hash for access_token (old Supabase)
        let hash = window.location.hash
        if (hash && hash.includes('access_token')) {
            const params = new URLSearchParams(hash.substring(1))
            const token = params.get('access_token')
            const expiresIn = params.get('expires_in')
            const refreshToken = params.get('refresh_token')
            if (token) {
                localStorage.setItem('mehis_token', token)
                if (refreshToken) localStorage.setItem('mehis_refresh', refreshToken)
                window.location.hash = ''
                location.href = 'dashboard.html'
                return
            }
        }
        
        // Check for error in hash
        if (hash && hash.includes('error')) {
            const params = new URLSearchParams(hash.substring(1))
            const error = params.get('error_description') || params.get('error')
            alert('Login error: ' + error)
            return
        }
        
        // Check URL params for code (newer Supabase)
        const urlParams = new URLSearchParams(window.location.search)
        const code = urlParams.get('code')
        if (code) {
            // Exchange code for session
            fetch(URL + '/auth/v1/token?grant_type=authorization_code&code=' + code, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Content-Type': 'application/json' }
            }).then(r => r.json()).then(data => {
                if (data.access_token) {
                    localStorage.setItem('mehis_token', data.access_token)
                    if (data.refresh_token) localStorage.setItem('mehis_refresh', data.refresh_token)
                    location.href = 'dashboard.html'
                } else {
                    alert('Login failed: ' + JSON.stringify(data))
                }
            }).catch(e => alert('Login error: ' + e))
        }
    }
    
    handleOAuthCallback()

    document.getElementById('form').onsubmit = async e => {
        e.preventDefault()
        const btn = e.target.querySelector('button')
        btn.textContent = 'Loading...'
        
        const email = document.getElementById('email').value
        const pass = document.getElementById('pass').value
        
        const res = await fetch(URL + '/auth/v1/token?grant_type=password', {
            method: 'POST',
            headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pass })
        })
        
        const data = await res.json()
        
        if (data.error) {
            alert('Error: ' + (data.error_description || data.error))
            btn.textContent = 'Sign In'
        } else {
            localStorage.setItem('mehis_token', data.access_token)
            location.href = 'dashboard.html'
        }
    }
    </script>
</body>
</html>
