<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Mehis</title>
    <style>
        :root { --primary: #2C3E50; --bg: #F5F5DC; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .card { background: white; padding: 25px; border-radius: 16px; margin: 20px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); }
        h2 { color: var(--primary); font-size: 20px; margin-bottom: 15px; }
        
        .btn { padding: 14px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: var(--bg); }
        .btn-discord { background: #5865F2; color: white; font-size: 16px; }
        .btn-logout { background: #c0392b; color: white; }
        
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .info-label { color: #666; }
        .info-value { font-weight: 600; color: var(--primary); }
        
        .tier-badge { background: #FFD700; color: #333; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        
        .questions-left { font-size: 24px; font-weight: bold; color: var(--primary); }
        
        .hero-card { background: linear-gradient(135deg, #5865F2, #2C3E50); color: white; text-align: center; }
        .hero-card h2 { color: white; }
        .hero-card p { color: #ddd; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🍯 Mehis Dashboard</h1>
        </div>
        
        <!-- Account -->
        <div class="card">
            <h2>📧 Your Account</h2>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="userEmail">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label">Plan</span>
                <span class="tier-badge" id="userTier">Free</span>
            </div>
        </div>
        
        <!-- Usage -->
        <div class="card">
            <h2>📊 Questions Today</h2>
            <div class="questions-left">
                <span id="questionsLeft">0</span> / 10
            </div>
            <p style="color: #666; font-size: 14px;">Free users get 10 questions per day</p>
            <a href="https://t.me/Mehis" target="_blank" class="btn btn-primary">💬 Open Telegram Bot</a>
        </div>
        
        <!-- Discord Community - HERO section! -->
        <div class="card hero-card">
            <h2>👥 Join Our Community</h2>
            <p>Connect with other ADHD parents, get tips, and support from people who understand!</p>
            <a href="https://discord.gg/necv75Yxzg" target="_blank" class="btn btn-discord">
                💬 Join Discord Community
            </a>
        </div>
        
        <!-- Logout -->
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="logout()" class="btn btn-logout">Logout</button>
        </div>
    </div>
    
    <script>
    // Handle OAuth token in URL (for Discord login)
    function handleOAuthToken() {
        const hash = window.location.hash
        if (hash && hash.includes('access_token')) {
            const params = new URLSearchParams(hash.substring(1))
            const token = params.get('access_token')
            if (token) {
                localStorage.setItem('mehis_token', token)
                window.history.replaceState(null, null, ' ')
            }
        }
    }
    
    handleOAuthToken()
    
    // Check login
    const token = localStorage.getItem('mehis_token')
    if (!token) {
        location.href = 'login.html'
    }
    
    // Show user info
    document.getElementById('userEmail').textContent = 'Logged in via Discord'
    
    function logout() {
        localStorage.removeItem('mehis_token')
        location.href = 'login.html'
    }
    </script>
</body>
</html>
