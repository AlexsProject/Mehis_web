<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mehis</title>
    <style>
        :root { --primary: #2C3E50; --bg: #F5F5DC; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .left-col { width: 40%; }
        .right-col { width: 60%; }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-col, .right-col { width: 100%; }
        }
        
        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin: 0 0 15px 0; font-size: 28px; }
        h2 { color: var(--primary); font-size: 16px; margin-bottom: 10px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: var(--bg); }
        .btn-discord { background: #5865F2; color: white; }
        .btn-logout { background: #c0392b; color: white; }
        
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .info-label { color: #666; font-size: 14px; }
        .info-value { font-weight: 600; color: var(--primary); font-size: 14px; }
        
        .tier-badge { background: #FFD700; color: #333; padding: 3px 12px; border-radius: 20px; font-size: 12px; }
        
        .questions-left { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        /* Chat styles */
        .chat-container { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); height: calc(100vh - 100px); display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .chat-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .message { padding: 10px; margin: 5px 0; border-radius: 8px; }
        .message-user { background: #e0f0ff; margin-left: 20%; }
        .message-mehis { background: #f0f0f0; margin-right: 20%; }
        .typing { color: #666; font-style: italic; }
        
        .hero-card { background: linear-gradient(135deg, #5865F2, #2C3E50); color: white; }
        .hero-card h2 { color: white; }
        .hero-card p { color: #ddd; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left column (40%) - Account, Questions, Community -->
        <div class="left-col">
            <div class="card">
                <h1>🍯 Mehis Dashboard</h1>
            </div>
            
            <!-- Account -->
            <div class="card">
                <h2>📧 Your Account</h2>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="userEmail">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Plan</span>
                    <span class="tier-badge" id="userTier">Free</span>
                </div>
            </div>
            
            <!-- Questions -->
            <div class="card">
                <h2>📊 Questions Today</h2>
                <div class="questions-left">
                    <span id="questionsLeft">0</span> / 10
                </div>
                <p style="color: #666; font-size: 12px;">Free users get 10 questions per day</p>
            </div>
            
            <!-- Community -->
            <div class="card hero-card">
                <h2>👥 Join Our Community</h2>
                <p>Connect with other ADHD parents!</p>
                <a href="https://discord.gg/necv75Yxzg" target="_blank" class="btn btn-discord">
                    💬 Join Discord
                </a>
            </div>
            
            <!-- Logout -->
            <div style="text-align: center;">
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </div>
        
        <!-- Right column (60%) - Chat -->
        <div class="right-col">
            <div class="chat-container">
                <h2>💬 Chat with Mehis</h2>
                <div class="chat-messages" id="chatMessages">
                    <div class="message message-mehis">👋 Hi! I'm Mehis, your ADHD coaching assistant. Ask me anything!</div>
                </div>
                <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" style="margin-top: 10px;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <script>
    const token = localStorage.getItem('mehis_token')
    if (!token) location.href = 'login.html'
    
    document.getElementById('userEmail').textContent = 'Logged in'
    
    const OLLAMA_URL = "http://localhost:11434/api/generate"
    const MODEL_NAME = "mehis"
    const SYSTEM_PROMPT = "You are Mehis, a helpful ADHD coaching assistant for parents. Keep responses concise and supportive."
    
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage() }
    
    function addMessage(text, isUser) {
        const div = document.createElement('div')
        div.className = 'message ' + (isUser ? 'message-user' : 'message-mehis')
        div.textContent = text
        document.getElementById('chatMessages').appendChild(div)
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight
    }
    
    function showTyping() {
        const div = document.createElement('div')
        div.className = 'message message-mehis typing'
        div.textContent = '🤔 Thinking...'
        div.id = 'typingMsg'
        document.getElementById('chatMessages').appendChild(div)
    }
    
    function hideTyping() {
        const typing = document.getElementById('typingMsg')
        if (typing) typing.remove()
    }
    
    async function sendMessage() {
        const input = document.getElementById('chatInput')
        const message = input.value.trim()
        if (!message) return
        
        addMessage(message, true)
        input.value = ''
        showTyping()
        
        try {
            const response = await fetch(OLLAMA_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: MODEL_NAME, prompt: SYSTEM_PROMPT + "\n\nUser: " + message + "\nMehis:", stream: false})
            })
            
            hideTyping()
            
            if (response.ok) {
                const data = await response.json()
                addMessage(data.response || "I'm thinking...", false)
            } else {
                addMessage("Error: Make sure Ollama is running!", false)
            }
        } catch (e) {
            hideTyping()
            addMessage("Error: Cannot connect to Ollama on localhost:11434", false)
        }
    }
    
    function logout() {
        localStorage.removeItem('mehis_token')
        location.href = 'login.html'
    }
    </script>
</body>
</html>
